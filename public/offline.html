<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline – TravelPlanner</title>
    <style>
      :root {
        --bg: #f4f4f5;
        --fg: #18181b;
        --muted: #71717a;
        --surface: #ffffff;
        --border: #e4e4e7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #f4f4f5;
          --muted: #8b8b94;
          --surface: #131316;
          --border: #27272a;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        text-align: center;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 0.75rem;
        padding: 2rem 1.5rem;
      }
      svg { color: var(--muted); }
      h1 { font-size: 1.25rem; margin: 1rem 0 0.5rem; }
      p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; margin: 0 0 1.25rem; }
      button {
        font: inherit;
        font-weight: 500;
        font-size: 0.875rem;
        cursor: pointer;
        border: 0;
        border-radius: 0.5rem;
        padding: 0.5rem 1rem;
        background: var(--fg);
        color: var(--bg);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z" />
      </svg>
      <h1>Du bist offline</h1>
      <p>
        TravelPlanner braucht eine Internetverbindung, um deine Reisen zu laden.
        Sobald du wieder online bist, geht es weiter.
      </p>
      <button onclick="location.reload()">Erneut versuchen</button>
    </div>
  </body>
</html>
